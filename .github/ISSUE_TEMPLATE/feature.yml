name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For larger features, expect some discussion before implementation —
        see the CONTRIBUTING guide.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that you currently can't (or can't do well)?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Sketch API/usage if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I'd be willing to implement this (in ts/, go/, or both)
